<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#152d4a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="800" fill="url(#bg)"/>

  <!-- Gold accent bar top -->
  <rect x="0" y="0" width="600" height="6" fill="#c4a24d"/>

  <!-- Subtitle -->
  <text x="300" y="120" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="1">75+ Ready-to-Use Prompts</text>
  <text x="300" y="150" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="1">for Ministry</text>

  <!-- Main title -->
  <text x="300" y="260" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2">AI</text>
  <text x="300" y="340" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="bold" fill="#c4a24d" text-anchor="middle" letter-spacing="3">PROMPTS</text>
  <text x="300" y="410" font-family="Georgia, 'Times New Roman', serif" font-size="36" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="4">FOR</text>
  <text x="300" y="480" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="bold" fill="#c4a24d" text-anchor="middle" letter-spacing="3">PASTORS</text>

  <!-- Decorative prompt cursor icon -->
  <g transform="translate(240, 530)">
    <!-- Chat bubble shape -->
    <rect x="0" y="0" width="120" height="80" rx="12" fill="none" stroke="#c4a24d" stroke-width="2.5" opacity="0.6"/>
    <polygon points="30,80 50,80 35,98" fill="none" stroke="#c4a24d" stroke-width="2.5" opacity="0.6"/>
    <!-- Prompt lines inside -->
    <line x1="20" y1="25" x2="60" y2="25" stroke="rgba(255,255,255,0.5)" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="40" x2="80" y2="40" stroke="rgba(255,255,255,0.5)" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="55" x2="50" y2="55" stroke="rgba(255,255,255,0.5)" stroke-width="3" stroke-linecap="round"/>
    <!-- Cursor blink -->
    <rect x="55" y="48" width="2.5" height="14" fill="#c4a24d" opacity="0.8"/>
  </g>

  <!-- Gold divider -->
  <line x1="200" y1="660" x2="400" y2="660" stroke="#c4a24d" stroke-width="2"/>

  <!-- Author name -->
  <text x="300" y="710" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="6" font-weight="500">MARK ROSS JUNKANS</text>

  <!-- Gold accent bar bottom -->
  <rect x="0" y="794" width="600" height="6" fill="#c4a24d"/>
</svg>